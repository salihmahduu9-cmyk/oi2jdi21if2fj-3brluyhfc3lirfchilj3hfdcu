<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hercules Cloud Console</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0b0f19; color: #f1f5f9; padding: 2rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: #111827; padding: 2.5rem; border-radius: 12px; border: 1px solid #1f2937; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { font-size: 1.75rem; margin-bottom: 1.5rem; color: #38bdf8; text-align: center; font-weight: 800; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #9ca3af; font-weight: 600; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 0.85rem; background: #030712; border: 1px solid #374151; border-radius: 8px; color: #fff; font-size: 1rem; }
        textarea { height: 300px; font-family: monospace; resize: vertical; }
        .options-panel { background: #1f2937; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input { width: auto; cursor: pointer; }
        button { width: 100%; padding: 1rem; background: #2563eb; border: none; border-radius: 8px; color: white; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .result-box { margin-top: 2rem; padding: 1.5rem; background: #022c22; border: 1px solid #059669; border-radius: 8px; display: none; }
        .code-output { background: #030712; padding: 1rem; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 0.85rem; color: #34d399; margin-top: 0.5rem; border: 1px solid #1f2937; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ HERCULES OBFUSCATOR CLOUD ENTERPRISE</h1>
    
    <div class="grid">
        <div>
            <label>مفتاح التحقق للسكربت (Access Key):</label>
            <input type="text" id="scriptKey" placeholder="أدخل مفتاح الترخيص الآمن...">
        </div>
        <div>
            <label>بصمة جهاز المستخدم (Allowed HWID):</label>
            <input type="text" id="userHWID" placeholder="أدخل بصمة HWID المصرح لها...">
        </div>
    </div>

    <label>إعدادات حماية المحرك (تتطابق مع config.lua):</label>
    <div class="options-panel">
        <div class="checkbox-group">
            <input type="checkbox" id="optVM" checked>
            <label for="optVM">Virtual Machine (الآلة الوهمية)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="optAntiTamper" checked>
            <label for="optAntiTamper">Anti-Tamper (مكافحة التلاعب)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="optControlFlow" checked>
            <label for="optControlFlow">Control Flow (تغيير مسار الكود)</label>
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 1.5rem;">
        <label>كود الـ Lua المصدري (Raw Code):</label>
        <textarea id="scriptCode" placeholder="-- الصق كود Lua الأصلي هنا ليتم تشفيره وحمايته..."></textarea>
    </div>

    <button onclick="uploadAndObfuscate()">تشفير ورفع السكربت السحابي</button>

    <div class="result-box" id="resultBox">
        <h3 style="color: #34d399;">🔒 تم إغلاق الكود داخل آلة Hercules الوهمية بنجاح!</h3>
        <p style="margin-top: 0.5rem; font-size: 0.9rem; color: #a7f3d0;">رابط الاستدعاء الآمن (مغلق تماماً ضد الـ Loggers والوصول المباشر للـ Raw):</p>
        <div class="code-output" id="finalUrl"></div>
    </div>
</div>

<script>
    async function uploadAndObfuscate() {
        const key = document.getElementById('scriptKey').value;
        const hwid = document.getElementById('userHWID').value;
        const code = document.getElementById('scriptCode').value;
        
        const settings = {
            vm: document.getElementById('optVM').checked,
            antitamper: document.getElementById('optAntiTamper').checked,
            controlflow: document.getElementById('optControlFlow').checked
        };

        if (!key || !hwid || !code) {
            alert('الرجاء ملء كافة البيانات المطلوبة!');
            return;
        }

        // إرسال طلب المعالجة والتشفير للسيرفر الخلفي
        const response = await fetch('/api/obfuscate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, hwid, code, settings })
        });

        const result = await response.json();
        if (result.success) {
            const currentUrl = window.location.origin;
            document.getElementById('finalUrl').innerText = `${currentUrl}/api/obfuscate?fetch=${key}`;
            document.getElementById('resultBox').style.display = 'block';
        } else {
            alert('خطأ في معالجة التشفير: ' + result.error);
        }
    }
</script>

</body>
</html>
